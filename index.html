<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cadastro</h1>
        </div>

        <form id="formulario" class="form-ios">
            <div class="form-section">
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>

                <div class="form-group">
                    <label for="dataNascimento">Data de nascimento</label>
                    <input type="date" id="dataNascimento">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="celular">Celular</label>
                    <input type="tel" id="celular" placeholder="(00) 00000-0000">
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00">
                </div>

                <div class="form-group">
                    <label for="areaCurso">Área do curso</label>
                    <select id="areaCurso">
                        <option value="">Selecione uma opção</option>
                        <option value="tecnologia">Tecnologia</option>
                        <option value="saude">Saúde</option>
                        <option value="negocios">Negócios</option>
                        <option value="humanas">Humanas</option>
                        <option value="exatas">Exatas</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-primary" onclick="salvarFormulario()">
                    Salvar
                </button>
                <button type="button" class="btn-secondary" onclick="recuperarFormulario()">
                    Recuperar
                </button>
                <button type="button" class="btn-secondary" onclick="enviarFormulario()">
                    Enviar
                </button>
                <button type="button" class="btn-danger" onclick="limparFormulario()">
                    Limpar
                </button>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
